<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FOSSCOMM 2026 — LinkedIn company banner (4512×764)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  /* FOSSCOMM theme tokens */
  .fc {
    --paper: #FAFAF7;
    --ink: #0A0A0A;
    --ink-muted: #6B6B66;
    --accent: #0033FF;
    --border-on-blue: color-mix(in oklab, white 22%, transparent);
    /* ── Outline (/26 + UniWA) stroke weight — THE ONE KNOB ─────────────────────
       In `em`, so it's proportional to the font-size: the outline keeps the SAME
       relative weight no matter what px size you set the wordmark to. It equals the
       theme's weight = 3px ÷ (the site's rendered wordmark px). The site font is
       responsive (clamp 3rem→11rem), so the exact value tracks YOUR screen width:
         ~1366px screen → 0.026   ·  ~1600px → 0.022  ·  ~1920px → 0.018  ·  ≥2070px → 0.017
       Pick the one for the screen you compare on. */
    --outline-stroke: 0.020em;
    --font-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    font-family: var(--font-sans);
    color: #fff;
    -webkit-font-smoothing: antialiased;
    font-variant-numeric: tabular-nums;
    /* LinkedIn COMPANY-PAGE cover, authored at 4512×764. The whole layout below
       is built natively at this size — type, margins, dot grid and globe are all
       set from these numbers — so the export is a true render, never a resampled
       copy of a differently-shaped master.
       This size is 4× LinkedIn's 1128×191 rendered display box, exactly: 1128×4
       = 4512, 191×4 = 764. That is the useful property here. It means the banner
       is authored at the display box's true aspect (5.906:1) rather than the 6:1
       the upload guides quote, so nothing is letterboxed or cropped to fit; and
       it downsamples to the display size on a clean integer factor of 4, which
       is the sharpest possible reduction — every output pixel is an exact
       average of a 4×4 block, with no resampling blur.
       (The personal-PROFILE cover is a different, much less wide shape —
       1584×396, 4:1 — see banner-linkedin.html.) */
    width: 4512px; height: 764px;
    background-color: var(--accent);
    /* Dot grid on blue — white at 22% opacity, 24px spacing.
       24 is the closest sensible spacing that divides the WIDTH exactly:
       4512/24 = 188 columns, so the grid tiles the long axis flush. It cannot
       also divide the height — gcd(4512, 764) is only 4, far too dense for a
       dot field — so the vertical leaves a 20px remainder. background-position
       pulls the tiling up 2px so that leftover is split evenly: the first row of
       dots sits 10px from the top and the last sits 10px from the bottom,
       instead of 12px and 8px. Symmetric either way you look at it. */
    background-image: radial-gradient(circle, var(--border-on-blue) 2px, transparent 2px);
    background-size: 24px 24px;
    background-position: 0 -2px;   /* centres the 20px vertical remainder → dots at 10 + 24k */
    display: block;             /* was a 2-column grid; the left column is gone (see below) */
    overflow: hidden;
    box-shadow: 0 20px 80px rgba(0,0,0,0.4);
    position: relative;
  }
  .fc * { box-sizing: border-box; }

  /* ─── LEFT — the FOSSCOMM/26 wordmark ────────────────────────────────────
     Built to mirror .right .stack exactly: same font-size, same line-height,
     same 93px margin, same three-line block. Because both blocks are three
     lines at the same size, their ink heights are identical (577px), so setting
     the same top offset on each makes them share a top AND a bottom edge without
     any extra alignment work — the two columns read as one band of type.
     The only thing that differs is the horizontal correction. On the right the
     negative letter-spacing makes the ink OVERHANG its box, so the offset is
     padded outward; on the left there is no trailing letter-spacing in play and
     the ink instead sits INSIDE the box by the first glyph's left side bearing,
     so the offset is pulled back by --ink-left-inset. Different sign, different
     magnitude, same purpose: make the 93px land on the ink.
     Heads up: the LinkedIn page logo is drawn ON TOP of the cover's lower-left
     corner. It overlaps roughly the first ~160px here, which clears this
     wordmark's 93px start only because the logo sits low — check it against the
     live page before treating this as final. */
  .left {
    position: absolute;
    inset: 0;
    z-index: 2;                      /* above the globe layer, same as .right */
  }
  .left .mark {
    position: absolute;
    --margin: 93px;
    --ink-top-inset: 0.0487em;       /* same font metric as the right stack */
    /* MEASURED, and it came out NEGATIVE — the ink overhangs its box to the
       left rather than sitting inside it. Two things push it out: the "/" of
       /26 carries almost no left side bearing, and that line is stroked, so
       -webkit-text-stroke paints half its width outboard of the glyph outline.
       So this pads the offset outward, same as the right stack's overhang. */
    --ink-left-inset: -0.0263em;
    top: calc(var(--margin) - var(--ink-top-inset));
    left: calc(var(--margin) - var(--ink-left-inset));
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 239.3px;              /* MUST match .right .stack */
    line-height: 0.84;
    letter-spacing: -0.05em;
    color: #fff;
    text-align: left;
  }
  .left .mark .outline {
    -webkit-text-stroke: var(--outline-stroke) #fff;
    color: transparent;
    font-weight: 700;
  }

  /* ─── RIGHT — the 3-line date / venue stack ── */
  .right {
    position: absolute;
    inset: 0;                        /* was a grid column; now spans the banner so the stack's % offsets resolve against the FULL 396px height */
    z-index: 2;                      /* keep the date stack above the globe layer */
  }
  .right .stack {
    position: absolute;
    /* EQUAL OPTICAL MARGIN top and right — the type's INK sits 48px from both
       edges. Neither axis is a plain `48px` offset, because CSS offsets measure
       to the LINE BOX and the ink sits inside it by a different amount on each
       axis:
         · top   — the first line's box is taller than the cap height, so part of
                   the leading sits above the "3" as invisible padding, putting
                   the ink 5px lower than the offset says.
         · right — letter-spacing applies after EVERY character including the
                   last, and it is negative (-0.05em), so the line box ends short
                   of where the final glyph's ink actually stops and the type
                   overhangs its own box by 4px.
       Both corrections were MEASURED off the rendered PNG with _measure-geom.ps1
       (which scans for the outermost lit pixel), not guessed. They are in `em`
       because both scale with the type: the top inset is a font-metric fraction
       of the size, and the overhang is the letter-spacing minus the last glyph's
       side bearing. So font-size can change without re-truing them. */
    --margin: 93px;
    --ink-top-inset: 0.0487em;
    --ink-right-overhang: 0.0421em;
    top: calc(var(--margin) - var(--ink-top-inset));
    right: calc(var(--margin) + var(--ink-right-overhang));
    font-family: var(--font-display);
    font-weight: 700;
    /* 239.5px, and this number is DERIVED, not chosen. The stack has to sit the
       same 93px from the top, the bottom AND the right, so its ink height is
       fixed: 763 - 93 - 93 = 577px (763, not 764, because a gap is measured to
       the last pixel row, exactly as the right gap is measured to the last
       pixel column). Measuring a render gives this face's ink height as
       2.4093 × font-size for three lines at line-height 0.84, so:
           577 / 2.4093 = 239.5px
       Change --margin and this must be recomputed, or the block stops being
       vertically centred. The ink then runs y=93 → y=670.

       The globe is not a constraint on this side. Its crest is at the banner's
       centre and the sphere has curved below the bottom edge well before this
       stack begins, so the type sits over plain blue for its whole height even
       though it hangs far below the crest. */
    font-size: 239.3px;
    line-height: 0.84;
    letter-spacing: -0.05em;
    color: #fff;
    text-align: right;
  }
  /* No inter-line gap — the theme's hero spaces its lines by line-height:0.84
     alone, so the date stack does too. (Was margin-top:14px.) */
  .right .stack .outline {
    -webkit-text-stroke: var(--outline-stroke) #fff;   /* proportional → same relative weight at any font-size; tune via --outline-stroke */
    color: transparent;
    font-weight: 700;
  }

  /* ─── BOTTOM — venue globe (the actual FOSSCOMM theme MapLibre globe) ──
     This is assets/venue-map.js (the theme's live line-art globe: paper-white
     continents, grey coastlines/sea) — not a static image. On the banner it is
     run in `data-fc-transparent` mode so the atmosphere/paper backdrop is
     dropped and only the disc is drawn; the blue dotted banner shows through
     around it. The globe is framed LOW (its centre pushed below the banner's
     bottom edge) so only the top of the sphere crests up across the tiles, and
     it's rotated (data-fc-rest-lat) so Greece rides up to that crest. The map's
     accent pin sits on Athens 2026. */
  .globe-wrap {
    /* The render surface must be TALLER than the globe disc, never shorter.
       That is the whole trick: the disc floats inside the surface with
       transparent (blue-showing) margin above it, so sliding the surface with
       --globe-y moves the disc without ever bringing a surface edge up against
       the opaque globe — no cut, at any offset.

       VERTICALLY the surface is ~6200px for the ~5500px disc at data-fc-zoom
       5.45, so the crest has clear margin above it. HORIZONTALLY the surface is
       only as wide as the banner (4512px), which is NARROWER than the disc —
       that is deliberate and safe here: the sphere's own limb comes to rest well
       inside the banner, so the canvas never actually cuts painted globe. The
       left/right clip lands on empty transparent margin.

       Two knobs: data-fc-zoom sets the disc SIZE, --globe-y sets its POSITION in
       banner pixels. The size ceiling is the GPU's max renderbuffer (8192px on
       most drivers): the surface has to be TALLER than the disc, so a disc past
       ~8000px cannot be given a surface that contains it and starts cutting for
       real. 5450px leaves plenty of headroom. */
    position: absolute;
    left: 0;
    top: 0;
    width: 4512px;
    height: 6200px;                  /* taller than the ~5500px disc → transparent margin above the crest */
    z-index: 1;                      /* above the dotted bg, below the date text */
    pointer-events: none;            /* purely visual on the banner */

    /* MEASURED, not predicted: the disc's on-screen diameter is NOT a clean
       power of two in data-fc-zoom, so it has to be read off a render.
       Banner crest = (surface height - disc diameter)/2 + --globe-y.
       Re-measure with _measure-geom.ps1 after touching data-fc-zoom or the
       surface height, and re-derive --globe-y from what it reports.

       A higher crest also means a WIDER arc, because the chord the banner's
       bottom edge cuts through the sphere gets longer — that is what stops the
       globe reading as a small dome marooned in a very long strip.

       As rendered: crest at y=404, and the sphere meets the bottom edge at
       x=897 and x=3615 — 60% of the width, with a midpoint of 2256, which is the
       banner's centre to the pixel.

       The right-hand limit is what keeps the date stack clear: the sphere has to
       drop below the bottom edge before the type's left edge, so raising the
       globe too far would eventually walk the arc into "UniWA". Current nearest
       approach is 311px, so there is room to move.

       When re-measuring, note that the globe must be detected by its RED channel
       (sea is #C9C7BF — its BLUE channel is only 191, so an all-channels test
       silently measures the continents instead of the sphere).
       NEGATIVE = up, POSITIVE = down. */
    --globe-y: 160px;
    transform: translateY(var(--globe-y));
  }
  /* Static banner: hide the map's +/−/⌂ controls and attribution chrome. */
  .globe-wrap .maplibregl-control-container,
  .globe-wrap [data-fc-island="venue-map"] button { display: none !important; }
  /* Let the disc bleed past the island box instead of being clipped by it —
     the banner's own .fc overflow:hidden does the framing. */
  .globe-wrap [data-fc-island="venue-map"],
  .globe-wrap [data-fc-island="venue-map"] > div { overflow: visible !important; background: transparent !important; }
  .globe-wrap .maplibregl-map { background: transparent !important; }
</style>
</head>
<body>

  <div class="fc">

    <div class="left">
      <div class="mark">
        FOSS<br/>
        COMM<br/>
        <span class="outline">/26</span>
      </div>
    </div>

    <div class="right">
      <div class="stack">
        <div>31.10</div>
        <div>1.11</div>
        <div class="outline">UniWA</div>
      </div>
    </div>

    <!-- CENTER: venue globe — the theme's MapLibre line-art globe.
         Self-mounts via assets/venue-map.js on [data-fc-island="venue-map"].
         Banner knobs (see the patched copy in assets/venue-map.js):
           data-fc-transparent   — drop paper backdrop + atmosphere (blue shows through)
           data-fc-aspect        — the island box aspect (square, so the sphere isn't clipped by it)
           data-fc-zoom          — globe size
           data-fc-bottom-hidden — 0: globe centred in its box (banner .fc does the low framing)
           data-fc-rest-lat      — camera latitude; low value rolls Greece up to the crest -->
    <div class="globe-wrap" aria-hidden="true">
      <div data-fc-island="venue-map"
           data-fc-transparent
           data-fc-no-pins
           data-fc-aspect="0.728 / 1"
           data-fc-zoom="5.45"
           data-fc-bottom-hidden="0"
           data-fc-cluster-zoom="24"
           data-fc-rest-lat="-15"
           data-fc-venue-lat="37.9838"
           data-fc-venue-lon="23.7275"
           data-fc-cluster-label="FOSSCOMM"
           data-fc-editions='[{"year":2008,"city":"Athens","lat":"37.9838","lon":"23.7275","url":""},{"year":2009,"city":"Larissa","lat":"39.6390","lon":"22.4191","url":""},{"year":2010,"city":"Thessaloniki","lat":"40.6401","lon":"22.9444","url":""},{"year":2011,"city":"Patras","lat":"38.2466","lon":"21.7346","url":""},{"year":2012,"city":"Athens","lat":"37.9838","lon":"23.7275","url":""},{"year":2013,"city":"Heraklion","lat":"35.3387","lon":"25.1442","url":""},{"year":2014,"city":"Lamia","lat":"38.8991","lon":"22.4340","url":""},{"year":2015,"city":"Athens","lat":"37.9838","lon":"23.7275","url":""},{"year":2016,"city":"Thessaloniki","lat":"40.6401","lon":"22.9444","url":""},{"year":2017,"city":"Syros","lat":"37.4438","lon":"24.9211","url":""},{"year":2018,"city":"Heraklion","lat":"35.3387","lon":"25.1442","url":""},{"year":2019,"city":"Lamia","lat":"38.8991","lon":"22.4340","url":""},{"year":2020,"city":"Online","lat":"37.9838","lon":"23.7275","url":""},{"year":2021,"city":"Online","lat":"37.9838","lon":"23.7275","url":""},{"year":2022,"city":"Athens","lat":"37.9838","lon":"23.7275","url":""},{"year":2023,"city":"Heraklion","lat":"35.3387","lon":"25.1442","url":""},{"year":2024,"city":"Piraeus","lat":"37.9475","lon":"23.6469","url":"https://2024.fosscomm.gr"},{"year":2025,"city":"Thessaloniki","lat":"40.6401","lon":"22.9444","url":"https://2025.fosscomm.gr"},{"year":2026,"city":"Athens","lat":"37.9838","lon":"23.7275","url":"","current":true}]'></div>
    </div>

  </div>

  <!-- Freeze the globe for a static banner: pretend the user prefers reduced
       motion so venue-map.js skips the idle auto-rotation and the globe stays
       put (rotated to Greece). The desktop/mobile breakpoint query is passed
       through untouched. Must run BEFORE venue-map.js (which reads it at load). -->
  <script>
  (function () {
    var _mm = window.matchMedia ? window.matchMedia.bind(window) : null;
    function stub(matches, q) {
      return { matches: matches, media: q || '', onchange: null,
        addEventListener: function () {}, removeEventListener: function () {},
        addListener: function () {}, removeListener: function () {},
        dispatchEvent: function () { return false; } };
    }
    window.matchMedia = function (q) {
      if (/prefers-reduced-motion/.test(q)) return stub(true, q);
      return _mm ? _mm(q) : stub(false, q);
    };
  })();
  </script>
  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <script>
  /* ── assets/venue-map.js inlined here so 8.3.html is a single standalone file ──
     (the theme MapLibre globe, patched with the banner data-* knobs). MapLibre,
     the fonts and the OpenFreeMap tiles remain remote URLs — a live map needs a
     network at render time regardless. */
/* FOSSCOMM 2026 — Venue map island (replaces the old ASCII globe).
 *
 * MapLibre GL JS v5 + OpenFreeMap (positron) vector tiles, recoloured to the
 * paper/ink/blue palette and shown on a rotating globe. Editions become map
 * pins via a hard zoom switch (no pixel clustering): ALL editions are ONE
 * date-less sprite pin (the whole-Greece dot) below CLUSTER_UNTIL_ZOOM, then at
 * or above that threshold the dot gives way and every VENUE shows as its own
 * pin — no in-between regional clusters. Editions sharing a venue (identical
 * coords — Athens hosted 7, Thessaloniki/Heraklion 3…) collapse into ONE marker
 * (groupColocated) rather than stacking or fanning out: a venue is a single pin
 * no matter how many years it hosted, and hovering it lights up ALL of that
 * venue's editions in the sidebar at once. The custom +/−/⌂
 * controls match the old globe's buttons. The editions sidebar (desktop panel +
 * mobile bar in template-parts/sections/venue.php) drives the map: hover moves
 * + highlights, click opens the archive in a new tab (or a sass message when an
 * edition has no link). On mobile (no hover) the leftmost item under the bar's
 * scroll is auto-highlighted.
 *
 * Self-mounts on every [data-fc-island="venue-map"]; safe to load anywhere.
 */
(function () {
    'use strict';
    if (typeof maplibregl === 'undefined') return;

    var reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var mqMobile = window.matchMedia && window.matchMedia('(max-width: 1023.98px)');
    function isMobile() { return !!(mqMobile && mqMobile.matches); }

    // Palette (literals — setPaintProperty can't resolve CSS vars).
    // Line-art look: paper-white continents (they blend into the page). Their
    // coastline and the country borders inside them are drawn with the SAME grey
    // line (CONT) so they look identical, on an outline-grey sea.
    var PAPER  = '#FAFAF7';   // site paper — the area around the globe
    var LAND   = '#FAFAF7';   // continents — paper white (same as the page; CONT lines define their shape)
    var CONT   = '#B6B3A9';   // coastline + landuse + country borders — one consistent grey line
    var WATER  = '#C9C7BF';   // sea — the theme's outline grey
    var INK    = '#0A0A0A';
    var INK_MUTED = '#6B6B66';
    var ACCENT = '#0033FF';

    var STYLE_URL = 'https://tiles.openfreemap.org/styles/positron';

    var mounts = document.querySelectorAll('[data-fc-island="venue-map"]');
    Array.prototype.forEach.call(mounts, initMap);

    function initMap(mount) {
        var editions = [];
        try { editions = JSON.parse(mount.getAttribute('data-fc-editions') || '[]') || []; } catch (e) { editions = []; }

        var spriteUrl   = mount.getAttribute('data-fc-pin-sprite') || '';
        var venueLat    = parseFloat(mount.getAttribute('data-fc-venue-lat'));
        var venueLon    = parseFloat(mount.getAttribute('data-fc-venue-lon'));

        // ── Banner overrides (social/8.3.html) ────────────────────────────────
        // Optional data-* knobs so the same globe can be reframed for the static
        // Instagram banner without forking the component. TRANSPARENT drops the
        // paper backdrop + atmosphere so the blue dotted banner shows through
        // around the globe (on the site these default to the paper page bg).
        function _num(attr, dflt) { var v = parseFloat(mount.getAttribute(attr)); return isNaN(v) ? dflt : v; }
        var TRANSPARENT = mount.hasAttribute('data-fc-transparent');
        var BG_FILL     = TRANSPARENT ? 'transparent' : '#FAFAF7';
        var NO_PINS     = mount.hasAttribute('data-fc-no-pins');   // banner: draw the bare globe, no location dot

        // Pins = editions with usable coordinates.
        var pins = editions.filter(function (ed) {
            var la = parseFloat(ed.lat), lo = parseFloat(ed.lon);
            return !isNaN(la) && !isNaN(lo);
        }).map(function (ed) {
            return {
                year:    parseInt(ed.year, 10) || 0,
                city:    String(ed.city || ''),
                lat:     parseFloat(ed.lat),
                lon:     parseFloat(ed.lon),
                url:     String(ed.url || ''),
                current: !!ed.current
            };
        });

        var defaultCenter = computeCenter(pins, venueLat, venueLon);
        // ── Resting-view tweakables (the home / ⌂ button returns here) ─────────
        //   DEFAULT_ZOOM       — resting zoom. Lower = globe smaller / more zoomed out.
        //   BOTTOM_HIDDEN      — fraction of the box the globe's BOTTOM is clipped by.
        //   MIN_ZOOM           — zoom-OUT threshold (can't zoom out past this).
        //   MAX_ZOOM           — zoom-IN threshold (can't zoom in past this).
        //   CLUSTER_UNTIL_ZOOM — single-pin threshold. BELOW it all editions are one
        //                        dot (the whole-Greece pin); at/above it that dot is
        //                        replaced by every individual edition pin. Raise to
        //                        keep the one dot longer, lower to reveal the pins
        //                        sooner.
        //   REST_LAT           — the LATITUDE the globe is centred on at rest (⌂ /
        //                        home view). This is the "rotate the globe" knob:
        //                        LOWER it to roll the globe down so Greece rides up
        //                        toward the top with Africa/Arabia filling the view;
        //                        set it to the venue's own latitude (~38) to put
        //                        Greece back in the middle. The pins always use the
        //                        venue coords, so they stay on Greece regardless.
        var DEFAULT_ZOOM       = _num('data-fc-zoom', 2.1);
        var BOTTOM_HIDDEN      = _num('data-fc-bottom-hidden', 0.50);
        var MIN_ZOOM           = _num('data-fc-min-zoom', DEFAULT_ZOOM);
        var MAX_ZOOM           = 14;
        var CLUSTER_UNTIL_ZOOM = _num('data-fc-cluster-zoom', 3);
        var REST_LAT           = _num('data-fc-rest-lat', 25);   // ~North-Africa latitude → Greece sits high (photo 2). Use ~38 to centre Greece (photo 1). Lower still → Greece rides to the top crest (banner).
        var restZoom           = DEFAULT_ZOOM;   // ACTUAL settled resting zoom (set on load); used as the zoom-out floor

        // Resting camera target: the venue's longitude (keeps Greece horizontally
        // centred) but aimed at REST_LAT, so the globe shows the orientation above
        // without moving the editions pins (those stay on defaultCenter).
        var restCenter = [defaultCenter[0], REST_LAT];

        // Editions that shared a venue have IDENTICAL coords (Athens hosted 7,
        // Thessaloniki/Heraklion 3, Lamia 2). Rather than stack overlapping pins
        // (or fan them into a ring), collapse each same-place group into ONE
        // marker that remembers every edition it holds, so the map shows a single
        // pin per venue and hovering it lights up ALL of that venue's editions in
        // the sidebar. `pins` keeps the full per-edition list — the sidebar,
        // fly-to and the zoomed-out "all editions" dot still need it.
        var markers = groupColocated(pins);

        // ---- DOM: aspect-boxed map + custom controls ----
        mount.innerHTML = '';
        mount.style.position = 'relative';

        var box = document.createElement('div');
        box.style.position = 'relative';
        box.style.width = '100%';
        box.style.aspectRatio = mount.getAttribute('data-fc-aspect') || '10 / 7';
        box.style.overflow = 'hidden';
        box.style.background = BG_FILL;
        mount.appendChild(box);

        var mapEl = document.createElement('div');
        mapEl.style.position = 'absolute';
        mapEl.style.inset = '0';
        mapEl.style.background = BG_FILL;
        box.appendChild(mapEl);

        // The render surface is TALL (so the globe can slide up a long way before its
        // bottom edge shows). A tall surface × devicePixelRatio can blow past the
        // (software-)WebGL max drawing-buffer size, which makes the globe silently
        // fail to draw. So cap pixelRatio to keep the backing store under the budget
        // below — lowered only as far as needed.
        //
        // The budget is 40 MP here, raised from the 12 MP the 4:1 banners use. The
        // company-page surface is 4512×6200 = 28.0 MP, and at the old 12 MP cap this
        // resolved to pixelRatio 0.65 — the globe would have been drawn at 65% and

            b.setAttribute('style', btnStyle);
            b.setAttribute('aria-label', aria);
            b.textContent = label;
            b.addEventListener('click', fn);
            controls.appendChild(b);
            return b;
        }
        mk('+', 'Zoom in', function () { map.zoomIn(); });
        mk('−', 'Zoom out', function () { map.zoomOut(); });
        mk('⌂', 'Reset view', function () { resetView(); });
        box.appendChild(controls);
    }
})();
